<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="123.css">
 
</head>
<body>
    <div class="container">
    <div class="card">
    <div class="card-title">Subscriber Information</div>

    <div class="form-grid top-grid">
        <div class="input-box">
            <label>Abunə Kodu</label>
            <input type="text" id="idValue" placeholder="Abunə Kodu">
        </div>

        <div class="input-box">
            <label>SN</label>
            <input type="text" id="snAuth" placeholder="SN Auth">
        </div>

        <div class="input-box">
            <label>MAC Address</label>
            <input type="text" id="mac" placeholder="MAC Address">
        </div>
    </div>
</div>
<div class="card">
    <div class="card-title">GPON Parameters</div>

    <div class="form-grid">
        <div class="input-box">
            <label>Slot</label>
            <input list="numbers" id="interfaceNumber" placeholder="Slot">
            <datalist id="numbers"></datalist>
        </div>

        <div class="input-box">
            <label>Port</label>
            <input list="ports" id="ontNumber" placeholder="Port">
            <datalist id="ports"></datalist>
        </div>

        <div class="input-box">
            <label>ONT</label>
            <input type="text" id="ontNumber2" placeholder="ONT">
        </div>

        <div class="input-box">
            <label>Service Port</label>
            <input type="text" id="servicePort" placeholder="Service Port">
        </div>

        <div class="input-box">
            <label>VLAN</label>
            <input type="text" id="vlan" placeholder="VLAN">
        </div>

        <div class="input-box">
            <label>GEM Port</label>
            <input type="text" id="gemport" placeholder="GEM">
        </div>

        <div class="input-box">
            <label>Multicast</label>
            <input type="number" id="multicast" value="19">
        </div>
    </div>
</div>
<div class="card">
    <div class="card-title">Quick Commands</div>

    <div class="mini-buttons">
        <button onclick="port2()">ONT Info</button>
        <button onclick="service()">Service-Port</button>
        <button onclick="gemport()">GEM Port</button>
    </div>
</div>
<div class="card">
    <div class="card-title">Operations</div>

    <div class="button-group">
        <button onclick="citynet()">CityNet</button>
        <button onclick="komutuGoster()">Birlink</button>
        <button onclick="megalink()">Megalink</button>
        <button onclick="qaracuxur()">Qaracuxur</button>
        <button onclick="connect()">Aznet</button>
        <button onclick="Iptv()">IPTV</button>
        <button onclick="Sil()">Delete</button>
        <button onclick="Iptvdel()">IPTV Delete</button>
        <button onclick="Elaveler()">Əlavələr</button>
    </div>
</div>
<div class="terminal-card">
    <div class="terminal-header">
        <span>Generated Commands</span>

        <button onclick="navigator.clipboard.writeText(document.getElementById('sonuc').innerText)">
            Copy
        </button>
    </div>

    <pre id="sonuc"></pre>
</div>
    <script src="123.js"></script>
</body>
</html>
